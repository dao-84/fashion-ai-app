<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password dimenticata | Shotless.ai</title>
  <link rel="icon" type="image/png" href="images/logo-piccolo.png">
  <link rel="stylesheet" href="templatemo-prism-flux.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0a0c; font-family: inherit; }
    .box { width: min(420px, 90%); background: linear-gradient(180deg,rgba(15,15,18,.98),rgba(10,10,12,.98)); border: 1px solid rgba(212,175,55,.24); border-radius: 24px; padding: 40px 32px; }
    .logo { font-size: 12px; letter-spacing: .22em; text-transform: uppercase; color: rgba(212,175,55,.78); margin-bottom: 28px; }
    .title { font-size: 22px; font-weight: 700; color: #f4f0e6; margin: 0 0 10px; }
    .subtitle { font-size: 14px; color: rgba(255,255,255,.5); line-height: 1.6; margin: 0 0 28px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.6); }
    .input { width: 100%; padding: 13px 16px; border-radius: 12px; border: 1px solid rgba(212,175,55,.22); background: rgba(255,255,255,.04); color: #fff; font-size: 15px; outline: none; box-sizing: border-box; }
    .input:focus { border-color: rgba(212,175,55,.55); box-shadow: 0 0 0 3px rgba(212,175,55,.1); }
    .btn { width: 100%; border: 0; border-radius: 999px; padding: 13px; font-size: 14px; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; font-weight: 700; background: linear-gradient(135deg,#d4af37,#f6dd8a); color: #141414; margin-top: 4px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .status { min-height: 18px; margin: 4px 0 10px; font-size: 13px; color: #f3c969; }
    .status.is-error { color: #ff8f8f; }
    .back { display: block; text-align: center; margin-top: 20px; font-size: 12px; color: rgba(255,255,255,.4); text-decoration: none; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">Shotless.ai</div>
    <h1 class="title">Password dimenticata?</h1>
    <p class="subtitle">Inserisci la tua email e ti mandiamo un link per reimpostare la password.</p>
    <div class="field">
      <label class="label" for="fpEmail">Email</label>
      <input class="input" id="fpEmail" type="email" autocomplete="email" placeholder="la@tua.email">
    </div>
    <div class="status" id="fpStatus"></div>
    <button class="btn" id="fpSubmit">Invia link di reset</button>
    <a href="index.html" class="back">← Torna alla home</a>
  </div>

  <script>
    var btn = document.getElementById('fpSubmit');
    var status = document.getElementById('fpStatus');

    btn.addEventListener('click', function () {
      var email = (document.getElementById('fpEmail').value || '').trim();
      if (!email) { showStatus('Inserisci la tua email.', true); return; }

      btn.disabled = true;
      showStatus('Invio in corso...', false);

      fetch('/api/auth/request-reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email }),
      })
        .then(function (r) { return r.json(); })
        .then(function () {
          btn.disabled = false;
          showStatus('✓ Se l\'email è registrata, riceverai il link a breve. Controlla anche lo spam.', false);
        })
        .catch(function () {
          btn.disabled = false;
          showStatus('Errore di rete. Riprova.', true);
        });
    });

    document.getElementById('fpEmail').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') btn.click();
    });

    function showStatus(msg, isError) {
      status.textContent = msg;
      status.className = 'status' + (isError ? ' is-error' : '');
    }
  </script>
</body>
</html>
