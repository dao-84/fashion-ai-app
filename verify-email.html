<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conferma email | Shotless.ai</title>
  <link rel="icon" type="image/png" href="images/logo-piccolo.png">
  <link rel="stylesheet" href="templatemo-prism-flux.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0a0c; font-family: inherit; }
    .verify-box { width: min(420px, 90%); background: linear-gradient(180deg,rgba(15,15,18,.98),rgba(10,10,12,.98)); border: 1px solid rgba(212,175,55,.24); border-radius: 24px; padding: 40px 32px; text-align: center; }
    .verify-logo { font-size: 12px; letter-spacing: .22em; text-transform: uppercase; color: rgba(212,175,55,.78); margin-bottom: 28px; }
    .verify-icon { font-size: 48px; margin-bottom: 20px; }
    .verify-title { font-size: 22px; font-weight: 700; color: #f4f0e6; margin-bottom: 12px; }
    .verify-msg { font-size: 14px; color: rgba(255,255,255,.55); line-height: 1.6; margin-bottom: 28px; }
    .verify-btn { display: inline-block; background: linear-gradient(135deg,#d4af37,#f6dd8a); color: #141414; font-weight: 700; font-size: 13px; letter-spacing: .08em; text-transform: uppercase; padding: 13px 32px; border-radius: 999px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="verify-box">
    <div class="verify-logo">Shotless.ai</div>
    <div class="verify-icon" id="verifyIcon">⏳</div>
    <div class="verify-title" id="verifyTitle">Verifica in corso...</div>
    <div class="verify-msg" id="verifyMsg">Attendi qualche secondo.</div>
    <div id="verifyAction"></div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');

      if (!token) {
        document.getElementById('verifyIcon').textContent = '❌';
        document.getElementById('verifyTitle').textContent = 'Link non valido';
        document.getElementById('verifyMsg').textContent = 'Il link di verifica non è corretto. Prova a registrarti di nuovo.';
        document.getElementById('verifyAction').innerHTML = '<a href="index.html" class="verify-btn">Torna alla home</a>';
        return;
      }

      fetch('/api/auth/verify-email/' + encodeURIComponent(token))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.ok) {
            document.getElementById('verifyIcon').textContent = '✅';
            document.getElementById('verifyTitle').textContent = 'Email confermata!';
            document.getElementById('verifyMsg').textContent = 'Il tuo account è attivo. Accedi per iniziare a usare Shotless.ai.';
            document.getElementById('verifyAction').innerHTML = '<a href="studio.html" class="verify-btn">Vai allo studio</a>';
          } else {
            document.getElementById('verifyIcon').textContent = '❌';
            document.getElementById('verifyTitle').textContent = 'Link non valido';
            document.getElementById('verifyMsg').textContent = data.error || 'Il link è scaduto o già utilizzato.';
            document.getElementById('verifyAction').innerHTML = '<a href="index.html" class="verify-btn">Torna alla home</a>';
          }
        })
        .catch(function () {
          document.getElementById('verifyIcon').textContent = '❌';
          document.getElementById('verifyTitle').textContent = 'Errore di rete';
          document.getElementById('verifyMsg').textContent = 'Riprova tra qualche secondo.';
          document.getElementById('verifyAction').innerHTML = '<a href="index.html" class="verify-btn">Torna alla home</a>';
        });
    })();
  </script>
</body>
</html>
