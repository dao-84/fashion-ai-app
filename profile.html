<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="images/logo-piccolo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profilo | Shotless.ai</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="templatemo-prism-flux.css">
  <style>
    .profile-page { min-height: 100vh; background: #0a0a0c; color: #f4f0e6; font-family: 'Orbitron', 'Rajdhani', sans-serif; }
    .profile-main { max-width: 560px; margin: 0 auto; padding: 100px 24px 60px; }
    .profile-eyebrow { font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: rgba(212,175,55,.7); margin-bottom: 10px; }
    .profile-title { font-size: 28px; font-weight: 700; color: #f4f0e6; margin-bottom: 40px; }
    .profile-card { background: linear-gradient(180deg,rgba(15,15,18,.98),rgba(10,10,12,.98)); border: 1px solid rgba(212,175,55,.2); border-radius: 20px; padding: 28px; margin-bottom: 20px; }
    .profile-card__title { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: rgba(212,175,55,.7); margin-bottom: 20px; }
    .profile-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
    .profile-row:last-child { border-bottom: none; }
    .profile-row__label { font-size: 13px; color: rgba(255,255,255,.5); }
    .profile-row__value { font-size: 14px; color: #f4f0e6; font-weight: 500; }
    .profile-badge { display: inline-block; padding: 3px 12px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; background: rgba(212,175,55,.15); color: #d4af37; border: 1px solid rgba(212,175,55,.3); }
    .profile-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .profile-label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.5); }
    .profile-input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(212,175,55,.22); background: rgba(255,255,255,.04); color: #fff; font-size: 15px; outline: none; box-sizing: border-box; }
    .profile-input:focus { border-color: rgba(212,175,55,.55); box-shadow: 0 0 0 3px rgba(212,175,55,.1); }
    .profile-status { min-height: 18px; margin: 4px 0 10px; font-size: 13px; color: #f3c969; }
    .profile-status.is-error { color: #ff8f8f; }
    .profile-status.is-success { color: #7ed97e; }
    .profile-btn { width: 100%; border: 0; border-radius: 999px; padding: 13px; font-size: 14px; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; font-weight: 700; background: linear-gradient(135deg,#d4af37,#f6dd8a); color: #141414; margin-top: 4px; }
    .profile-btn:disabled { opacity: .5; cursor: not-allowed; }
    .profile-btn--outline { background: transparent; border: 1px solid rgba(212,175,55,.4); color: #d4af37; margin-top: 8px; }
    .profile-btn--outline:hover { background: rgba(212,175,55,.08); }
    .profile-loading { text-align: center; color: rgba(255,255,255,.4); font-size: 14px; padding: 40px 0; }
  </style>
</head>
<body class="profile-page">

  <header class="header legal-header" id="header">
    <nav class="nav-container">
      <a href="index.html" class="logo">
        <img src="images/logo-shotless.png" alt="Shotless.ai" style="height:110px; width:auto; display:block; margin:-33px 0;">
      </a>
      <ul class="nav-menu legal-nav">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="studio.html" class="nav-link">Studio</a></li>
        <li><a href="pricing.html" class="nav-link">Prezzi</a></li>
        <li><a href="#" class="nav-link" data-auth-link data-auth-default="Accedi">Accedi</a></li>
        <li class="nav-credit"><span class="studio-credit" id="studioCredit" aria-label="Remaining credit"></span></li>
      </ul>
      <div class="lang-switcher">
        <button class="lang-selected" onclick="toggleLangDropdown(this)" aria-label="Cambia lingua">🇮🇹</button>
        <div class="lang-dropdown">
          <button class="lang-option" data-lang="it" onclick="setLang('it')">🇮🇹</button>
          <button class="lang-option" data-lang="en" onclick="setLang('en')">🇬🇧</button>
          <button class="lang-option" data-lang="es" onclick="setLang('es')">🇪🇸</button>
        </div>
      </div>
    </nav>
  </header>

  <main class="profile-main">
    <p class="profile-eyebrow" data-i18n="profile_eyebrow">Account</p>
    <h1 class="profile-title" data-i18n="profile_title">Il tuo profilo</h1>

    <div id="profileLoading" class="profile-loading" data-i18n="profile_loading">Caricamento...</div>

    <div id="profileContent" style="display:none;">

      <!-- Info account -->
      <div class="profile-card">
        <div class="profile-card__title" data-i18n="profile_account_title">Informazioni account</div>
        <div class="profile-row">
          <span class="profile-row__label" data-i18n="profile_email">Email</span>
          <span class="profile-row__value" id="profileEmail">—</span>
        </div>
        <div class="profile-row">
          <span class="profile-row__label" data-i18n="profile_plan">Piano</span>
          <span class="profile-row__value"><span class="profile-badge" id="profilePlan">Free</span></span>
        </div>
        <div class="profile-row">
          <span class="profile-row__label" data-i18n="profile_credits">Crediti disponibili</span>
          <span class="profile-row__value" id="profileCredits">—</span>
        </div>
        <div class="profile-row">
          <span class="profile-row__label" data-i18n="profile_member_since">Membro dal</span>
          <span class="profile-row__value" id="profileCreatedAt">—</span>
        </div>
      </div>

      <!-- Cambia password -->
      <div class="profile-card">
        <div class="profile-card__title" data-i18n="profile_pwd_title">Cambia password</div>
        <div class="profile-field">
          <label class="profile-label" for="currentPassword" data-i18n="profile_pwd_current">Password attuale</label>
          <input class="profile-input" id="currentPassword" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div class="profile-field">
          <label class="profile-label" for="newPassword" data-i18n="profile_pwd_new">Nuova password</label>
          <input class="profile-input" id="newPassword" type="password" placeholder="••••••••" autocomplete="new-password">
        </div>
        <div class="profile-field">
          <label class="profile-label" for="confirmPassword" data-i18n="profile_pwd_confirm">Conferma nuova password</label>
          <input class="profile-input" id="confirmPassword" type="password" placeholder="••••••••" autocomplete="new-password">
        </div>
        <div class="profile-status" id="pwdStatus"></div>
        <button class="profile-btn" id="savePwdBtn" data-i18n="profile_pwd_btn">Salva nuova password</button>
      </div>

      <!-- Logout -->
      <button class="profile-btn profile-btn--outline" id="logoutBtn" data-i18n="profile_logout">Esci dall'account</button>

    </div>
  </main>

  <script src="i18n.js"></script>
  <script src="beta-guard-client.js"></script>
  <script>
    (function () {
      var token = localStorage.getItem('auth_token');
      if (!token) { window.location.href = 'index.html'; return; }

      // Carica profilo
      fetch('/api/auth/profile', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (!data.user) { document.getElementById('profileLoading').textContent = 'Errore: ' + (data.error || 'risposta non valida dal server'); return; }
          var u = data.user;
          document.getElementById('profileEmail').textContent = u.email;
          document.getElementById('profilePlan').textContent = (u.plan || 'free').charAt(0).toUpperCase() + (u.plan || 'free').slice(1);
          document.getElementById('profileCredits').textContent = u.credits_balance !== undefined ? u.credits_balance : '—';
          if (u.created_at) {
            var d = new Date(u.created_at);
            document.getElementById('profileCreatedAt').textContent = d.toLocaleDateString('it-IT', { day: '2-digit', month: 'long', year: 'numeric' });
          }
          document.getElementById('profileLoading').style.display = 'none';
          document.getElementById('profileContent').style.display = 'block';
        })
        .catch(function (err) { document.getElementById('profileLoading').textContent = FashionAI.i18n.t('profile_err_loading_prefix') + (err && err.message ? err.message : String(err)); });

      // Cambia password
      document.getElementById('savePwdBtn').addEventListener('click', function () {
        var current = document.getElementById('currentPassword').value;
        var newPwd = document.getElementById('newPassword').value;
        var confirm = document.getElementById('confirmPassword').value;
        var statusEl = document.getElementById('pwdStatus');

        statusEl.className = 'profile-status';
        if (!current || !newPwd || !confirm) { statusEl.textContent = FashionAI.i18n.t('profile_err_fill_all'); statusEl.classList.add('is-error'); return; }
        if (newPwd !== confirm) { statusEl.textContent = FashionAI.i18n.t('profile_err_pwd_match'); statusEl.classList.add('is-error'); return; }
        if (newPwd.length < 6) { statusEl.textContent = FashionAI.i18n.t('profile_err_pwd_short'); statusEl.classList.add('is-error'); return; }

        var btn = document.getElementById('savePwdBtn');
        btn.disabled = true;
        statusEl.textContent = FashionAI.i18n.t('profile_pwd_saving');

        fetch('/api/auth/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ currentPassword: current, newPassword: newPwd })
        })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            btn.disabled = false;
            if (data.error) {
              statusEl.textContent = data.error;
              statusEl.classList.add('is-error');
            } else {
              statusEl.textContent = FashionAI.i18n.t('profile_pwd_success');
              statusEl.classList.add('is-success');
              document.getElementById('currentPassword').value = '';
              document.getElementById('newPassword').value = '';
              document.getElementById('confirmPassword').value = '';
            }
          })
          .catch(function () {
            btn.disabled = false;
            statusEl.textContent = FashionAI.i18n.t('profile_err_network');
            statusEl.classList.add('is-error');
          });
      });

      // Logout
      document.getElementById('logoutBtn').addEventListener('click', function () {
        window.authLogout && window.authLogout();
      });
    })();
  </script>
  <script>
    (function() {
      var token = localStorage.getItem('auth_token');
      var badge = document.getElementById('studioCredit');
      if (!token || !badge) return;
      fetch('/api/auth/profile', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.user && data.user.credits_balance !== undefined) {
            var bal = parseFloat(data.user.credits_balance);
            badge.textContent = (Number.isInteger(bal) ? bal : bal.toFixed(1)) + ' cr';
            badge.classList.remove('is-low', 'is-critical');
            if (bal < 1) badge.classList.add('is-critical');
            else if (bal <= 2) badge.classList.add('is-low');
          }
        }).catch(function() {});
    })();
  </script>
</body>
</html>
